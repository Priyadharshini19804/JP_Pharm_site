<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | J P Pharmacy</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .thankyou-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--gradient-hero);
      text-align: center;
      padding: 2rem;
    }
    .thankyou-card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: var(--radius-xl);
      padding: 3rem 4rem;
      max-width: 560px;
      animation: fadeInUp 0.8s var(--ease-out);
    }
    .thankyou-icon {
      width: 100px;
      height: 100px;
      background: var(--gradient-accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: var(--white);
      margin: 0 auto 2rem;
      animation: loaderPulse 2s ease-in-out infinite;
    }
    .thankyou-card h1 {
      font-size: 2rem;
      font-weight: 800;
      color: var(--white);
      margin-bottom: 1rem;
    }
    .thankyou-card p {
      font-size: 1rem;
      color: rgba(255,255,255,0.7);
      line-height: 1.7;
      margin-bottom: 2rem;
    }
    .thankyou-card .btn { margin: 0.5rem; }
  </style>
</head>
<body>
  <div class="thankyou-page">
    <div class="thankyou-card">
      <div class="thankyou-icon"><i class="fas fa-check"></i></div>
      <h1>Thank You!</h1>
      <p>Your enquiry has been received successfully. Our team at J P Pharmacy will get back to you shortly.</p>
      <a href="index.html" class="btn btn-accent"><i class="fas fa-home"></i> Back to Home</a>
      <a href="tel:09585535255" class="btn btn-outline"><i class="fas fa-phone"></i> Call Now</a>
    </div>
  </div>
</body>
</html>
